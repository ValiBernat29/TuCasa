<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Grupul Tu Casa | Bine ați venit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700;900&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#bd6628",
                        "charcoal": "#1a140f",
                    },
                    fontFamily: {
                        "display": ["Noto Serif", "serif"],
                        "sans": ["Noto Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans', sans-serif; }
        .font-display { font-family: 'Noto Serif', serif; }
        /* Efect de blur fin pe zona selectată */
        .hover-section:hover {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="h-screen w-full m-0 p-0 overflow-hidden bg-charcoal relative">

    <div class="absolute inset-0 z-0">
        <img src="mainpic.jpg" 
             alt="Background" 
             class="w-full h-full object-cover" />
        <div class="absolute inset-0 bg-black/40"></div>
    </div>

    <div class="absolute top-6 md:top-12 left-1/2 transform -translate-x-1/2 z-50 pointer-events-none w-full px-4 text-center">
        <h1 class="text-white text-xl md:text-4xl font-black font-display uppercase tracking-widest drop-shadow-2xl">
            Bine ați venit la Grupul Tu Casa
        </h1>
    </div>

    <div class="relative z-10 flex flex-col md:flex-row h-full w-full pt-16 md:pt-0">
        
        <a href="renovari.html" class="hover-section flex-1 flex flex-col items-center justify-center text-center p-4 md:p-6 border-b md:border-b-0 md:border-r border-white/20 group transition-all duration-500">
            
            <div class="w-20 h-20 md:w-28 md:h-28 rounded-full bg-white/10 backdrop-blur-md border border-white/30 flex items-center justify-center shadow-xl mb-4 md:mb-6 group-hover:scale-110 transition-transform duration-300 p-3 md:p-5">
                <img src="TuCasaLogo.png" alt="Logo" class="w-full h-full object-contain" />
            </div>

            <h2 class="font-display text-2xl md:text-5xl font-black text-white mb-1 md:mb-2 uppercase tracking-tight drop-shadow-lg">Divizia Renovări</h2>
            
            </a>

        <a href="imobiliare.html" class="hover-section flex-1 flex flex-col items-center justify-center text-center p-4 md:p-6 group transition-all duration-500">
            
            <div class="w-20 h-20 md:w-28 md:h-28 rounded-full bg-white/10 backdrop-blur-md border border-white/30 flex items-center justify-center shadow-xl mb-4 md:mb-6 group-hover:scale-110 transition-transform duration-300 p-3 md:p-5">
                <img src="TuCasaLogo.png" alt="Logo" class="w-full h-full object-contain" />
            </div>

            <h2 class="font-display text-2xl md:text-5xl font-black text-white mb-3 md:mb-4 uppercase tracking-tight drop-shadow-lg">Imobiliare</h2>
            
            <div class="flex flex-row items-center justify-center gap-2 md:gap-3 mb-2 md:mb-8 bg-black/20 px-4 md:px-6 py-2 rounded-full backdrop-blur-sm border border-white/10">
                <span class="text-xs md:text-base text-gray-200 uppercase tracking-widest font-light">Powered by</span>
                <img src="KW_logo.png" alt="Keller Williams" class="h-6 md:h-10 object-contain" />
            </div>
            
            </a>

    </div>
</body>
</html>
