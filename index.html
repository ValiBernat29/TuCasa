<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="utf-8"/>

    <title>Grupul Tu Casa | Bine ați venit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700;900&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#bd6628",
                        "charcoal": "#1a140f",
                    },
                    fontFamily: {
                        "display": ["Noto Serif", "serif"],
                        "sans": ["Noto Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans', sans-serif; }
        .font-display { font-family: 'Noto Serif', serif; }
        /* Efect de blur fin pe zona selectată */
        .hover-section:hover {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="h-screen w-full m-0 p-0 overflow-hidden bg-charcoal relative">

    <div class="absolute inset-0 z-0">

            <img src="TuCasaLogo.png" alt="Logo" class="w-3/4 h-3/4 object-contain" />
        </div>

            <h2 class="font-display text-3xl md:text-5xl font-black text-white mb-2 uppercase tracking-tight drop-shadow-lg">Divizia Renovări</h2>
        <br><br><br><br>
